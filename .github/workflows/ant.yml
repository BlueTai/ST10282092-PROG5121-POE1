name: NetBeans Ant Automated Tests

# This tells GitHub to wake up and run the script on your specific branch
on:
  push:
    branches: [ "master", "Prog5121_poe1-Final" ]
  pull_request:
    branches: [ "master", "Prog5121_poe1-Final" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Pulls your NetBeans project files onto the GitHub server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Installs JDK 25 on the GitHub server to match your setup
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # The magic command: Tells NetBeans' Ant system to run your LoginTest.java file
    - name: Run JUnit Tests
      run: ant test
